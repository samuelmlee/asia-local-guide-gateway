openapi: 3.0.3
info:
  title: Asia Local Guide - User API
  version: v1
servers:
  - url: http://localhost:8080
    description: Local development server

paths:

  /v1/users:
    post:
      tags:
        - AppUser
      summary: Create a new app user
      operationId: createAppUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAppUserDTO"
      responses:
        "201":
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppUserDTO"
        "400":
          description: Invalid request body

  /v1/users/{id}:
    get:
      tags:
        - AppUser
      summary: Get app user by ID
      operationId: getAppUser
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppUserDTO"
        "404":
          description: User not found

components:
  schemas:

    CreateAppUserDTO:
      type: object
      required:
        - providerUserId
        - providerName
        - email
      properties:
        providerUserId:
          type: string
          minLength: 1
        providerName:
          type: string
          enum:
            - FIREBASE
        email:
          type: string
          minLength: 1
        name:
          type: string

    AppUserDTO:
      type: object
      properties:
        userId:
          type: string
          format: uuid
