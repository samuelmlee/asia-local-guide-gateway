openapi: 3.0.3
info:
  title: Asia Local Guide - Destination API
  version: v1
servers:
  - url: http://localhost:8080
    description: Local development server

paths:

  /v1/destinations/sync/{providerName}:
    post:
      tags:
        - Destination
      summary: Sync destinations from a provider
      operationId: syncDestinations
      parameters:
        - name: providerName
          in: path
          required: true
          schema:
            type: string
            enum:
              - VIATOR
              - GET_YOUR_GUIDE
      responses:
        "200":
          description: Sync completed successfully
        "400":
          description: Invalid provider name

  /v1/destinations/autocomplete:
    get:
      tags:
        - Destination
      summary: Get destination autocomplete suggestions
      operationId: getAutocompleteSuggestions
      parameters:
        - name: query
          in: query
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DestinationDTO"
        "400":
          description: Invalid query parameter

components:
  schemas:

    DestinationDTO:
      type: object
      properties:
        destinationId:
          type: string
          format: uuid
        name:
          type: string
        type:
          type: string
          enum:
            - REGION
            - CITY
            - DISTRICT
            - OTHER
        parentName:
          type: string
