openapi: 3.0.3
info:
  title: Asia Local Guide - Activity Tag API
  version: v1
servers:
  - url: http://localhost:8080
    description: Local development server

paths:

  /v1/activity-tags:
    get:
      tags:
        - ActivityTag
      summary: Get all activity tags
      operationId: getActivityTags
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityTagDTO"

components:
  schemas:

    ActivityTagDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        promptText:
          type: string
